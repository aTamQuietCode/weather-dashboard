name: Deploy to Github pages

on:
    push:
        branches: ["main"] # mainブランチにpushされた時に起動

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                node-version: 20
                catche: 'npm'

            - name: Install dependensies
              run: npm ci

            # ここでGitHubのSecretsから環境変数を読み込みます
            - name: Build
              run: npm run build
              env:
                VITE_OPENWEATHER_API_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY }}

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifack
              uses: actions/upload-pages-artifact@v3
              with:
                path: './dist'
                
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4